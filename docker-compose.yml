services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_GPU: 0
    container_name: reliability-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./huggingface_cache:/app/huggingface_cache
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/huggingface_cache
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_MODEL=${LLM_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
    restart: unless-stopped
    networks:
      - reliability-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reliability-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - reliability-net

networks:
  reliability-net:
    driver: bridge
